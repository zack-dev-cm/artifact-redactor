name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile scripts
        run: python3 -m py_compile skill/artifact-redactor/scripts/*.py

      - name: Run smoke test
        run: python3 -m unittest discover -s tests -q
