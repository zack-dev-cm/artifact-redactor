name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Compile scripts
        run: python3 -m py_compile skill/artifact-redactor/scripts/*.py

      - name: Run smoke test
        run: python3 -m unittest discover -s tests -q

